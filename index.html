<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PMA | Tienda de Equipamiento Minero</title>
    <link rel="icon" type="image/jpeg" href="img/Logo/PMA-Logo.jpeg">
    
    <style>
        :root {
            --amarillo-pma: #ffcc00;
            --gris-oscuro: #232323;
            --blanco: #ffffff;
            --negro: #000000;
        }

        body { font-family: Arial, sans-serif; margin: 0; background: #f4f4f4; overflow-x: hidden; }

        /* --- HEADER CON CARRITO --- */
        header {
            background: var(--gris-oscuro);
            color: white;
            padding: 10px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            box-sizing: border-box;
            z-index: 3000;
            border-bottom: 3px solid var(--amarillo-pma);
        }

        .logo img { max-height: 40px; }

        .cart-icon-container {
            position: relative;
            cursor: pointer;
            background: var(--amarillo-pma);
            padding: 8px 15px;
            border-radius: 5px;
            color: var(--gris-oscuro);
            font-weight: bold;
        }

        #cart-count {
            background: red;
            color: white;
            border-radius: 50%;
            padding: 2px 7px;
            font-size: 12px;
            position: absolute;
            top: -5px;
            right: -5px;
        }

        /* --- HERO --- */
        .hero { height: 60vh; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; color: white; text-align: center; }
        #video-fondo { position: absolute; top: 50%; left: 50%; min-width: 100%; min-height: 100%; transform: translate(-50%, -50%); z-index: -1; object-fit: cover; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 0; }
        .hero-content { z-index: 1; }

        /* --- SECCIÓN PRODUCTOS --- */
        .section { padding: 80px 5%; max-width: 1200px; margin: 0 auto; text-align: center; }
        .interactive-wrapper { position: relative; line-height: 0; }
        .truck-img { width: 100%; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }

        /* HOTSPOTS */
        .hotspot { position: absolute; width: 30px; height: 30px; z-index: 2500; cursor: pointer; }
        .dot { width: 15px; height: 15px; background: var(--amarillo-pma); border: 2px solid white; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        
        .info-card {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            width: 250px;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
            z-index: 2600;
            text-align: left;
        }

        .hotspot:hover .info-card { opacity: 1; visibility: visible; }

        .btn-add {
            background: var(--gris-oscuro);
            color: var(--amarillo-pma);
            border: none;
            padding: 10px;
            width: 100%;
            margin-top: 10px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* --- PANEL LATERAL CARRITO --- */
        #cart-panel {
            position: fixed;
            right: -400px;
            top: 0;
            width: 350px;
            height: 100%;
            background: white;
            box-shadow: -5px 0 15px rgba(0,0,0,0.2);
            z-index: 4000;
            transition: 0.4s;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        #cart-panel.active { right: 0; }

        .cart-items { flex-grow: 1; overflow-y: auto; margin-top: 20px; }
        .cart-item { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 10px 0; align-items: center; }
        
        .btn-checkout {
            background: #25d366;
            color: white;
            border: none;
            padding: 15px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }

        .close-cart { cursor: pointer; font-weight: bold; font-size: 20px; }
    </style>
</head>
<body>

    <header>
        <div class="logo"><img src="img/Logo/PMA-Logo.jpeg" alt="PMA"></div>
        <div class="cart-icon-container" onclick="toggleCart()">
            🛒 CARRITO <span id="cart-count">0</span>
        </div>
    </header>

    <section class="hero">
        <video autoplay muted loop playsinline id="video-fondo">
            <source src="img/Video/Video_con_Barra_Modular_Específica.mp4" type="video/mp4">
        </video>
        <div class="overlay"></div>
        <div class="hero-content">
            <h1>Equipamiento PMA</h1>
            <p>Selecciona tus productos directamente desde el visualizador.</p>
        </div>
    </section>

    <div class="section" id="productos">
        <div class="interactive-wrapper">
            <img src="img/Fotos/camioneta-base-pma-real.jpg" class="truck-img">

            <div class="hotspot" style="top: 28%; left: 72%;">
                <div class="dot"></div>
                <div class="info-card">
                    <img src="img/Products/barra-modular-pma-info.jpg" style="width:100%; border-radius:5px;">
                    <h3>Barra Modular</h3>
                    <p>Estructura certificada.</p>
                    <button class="btn-add" onclick="addToCart('Barra Modular PMA')">Añadir al Carrito</button>
                </div>
            </div>

            <div class="hotspot" style="top: 72%; left: 65%;">
                <div class="dot"></div>
                <div class="info-card">
                    <img src="img/Products/Compresor Camioneta.avif" style="width:100%; border-radius:5px;">
                    <h3>Compresor PMA</h3>
                    <p>Potencia en terreno.</p>
                    <button class="btn-add" onclick="addToCart('Compresor de Aire PMA')">Añadir al Carrito</button>
                </div>
            </div>
        </div>
    </div>

    <div id="cart-panel">
        <div style="display: flex; justify-content: space-between;">
            <h2>Tu Pedido</h2>
            <span class="close-cart" onclick="toggleCart()">×</span>
        </div>
        <div class="cart-items" id="cart-list">
            </div>
        <button class="btn-checkout" onclick="sendWhatsApp()">Finalizar por WhatsApp</button>
    </div>

    <script>
        let cart = [];

        function toggleCart() {
            document.getElementById('cart-panel').classList.toggle('active');
        }

        function addToCart(product) {
            cart.push(product);
            updateCartUI();
            alert(product + " añadido!");
        }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const list = document.getElementById('cart-list');
            list.innerHTML = "";
            cart.forEach((item, index) => {
                list.innerHTML += `<div class="cart-item"><span>${item}</span><button onclick="removeItem(${index})">Eliminar</button></div>`;
            });
        }

        function removeItem(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        function sendWhatsApp() {
            if(cart.length === 0) return alert("El carrito está vacío");
            const message = encodeURIComponent("Hola PMA, me interesa cotizar:\n- " + cart.join("\n- "));
            window.open("https://wa.me/56912345678?text=" + message);
        }
    </script>

</body>
</html>
